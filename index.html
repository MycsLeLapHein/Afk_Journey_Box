<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFK Journey — Ma Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c11;--bg2:#10131b;--bg3:#161a24;--bg4:#212737;
  --border:#1f2430;--border2:#2c3243;
  --text:#eef0f6;--text2:#9aa2b6;--text3:#5f677b;
  --blue:#5aa0ff;--blue-bg:#16243c;--blue-dim:#101c30;
  --amber:#f0b94e;--amber-bg:#2a2008;
  --green:#46d090;--green-bg:#0a2418;
  --red:#ff6a6a;--red-bg:#2a1010;
  --purple:#a884ff;--teal:#2dd4bf;--pink:#f472b6;--orange:#fb923c;
  --gold:#e8b84b;
  --r:8px;--r2:12px;
}
body{font-family:'Rajdhani',system-ui,sans-serif;background:radial-gradient(1100px 520px at 50% -8%,#171c2a,#0a0c11 70%);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* TOPBAR */
.topbar{height:54px;background:linear-gradient(180deg,#141826,#0d1017);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex-shrink:0;padding:0 18px}
.brand{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:.1em;color:#f1e7cf;display:flex;align-items:center;gap:9px}
.brand-mark{color:var(--gold);font-size:15px;text-shadow:0 0 10px rgba(232,184,75,.5)}
.nav-center{display:flex;align-items:center;gap:2px;height:54px}
.nav-tab{height:100%;padding:0 16px;border:none;background:transparent;color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:.03em;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:linear-gradient(180deg,rgba(232,184,75,.1),transparent)}
.topbar-right{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.btn{height:30px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg4);color:var(--text);border-color:#3a4252}
.btn.primary{background:linear-gradient(180deg,#edc25a,#cc9a32);color:#1a1304;border-color:#e8b84b;font-weight:700}
.btn.primary:hover{filter:brightness(1.08)}
.count-badge{font-size:11px;font-weight:700;background:var(--bg4);color:var(--text3);padding:1px 6px;border-radius:4px;margin-left:4px}
.nav-tab.active .count-badge{background:rgba(232,184,75,.18);color:var(--gold)}

/* LAYOUT */
.page{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* SUBBAR */
.subbar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{height:32px;width:210px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 30px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:500;outline:none}
.search-wrap input:focus{border-color:var(--gold)}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;color:var(--text3)}
.role-select{height:32px;padding:0 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;outline:none;cursor:pointer}
.role-select:focus{border-color:var(--gold)}
.rf{height:26px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.rf:hover{background:var(--bg4);color:var(--text)}
.rf.active{background:rgba(232,184,75,.14);color:var(--gold);border-color:rgba(232,184,75,.45)}
.add-wrap{position:relative;margin-left:auto}
.add-btn{height:32px;padding:0 14px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.add-btn:hover{color:var(--green);border-color:var(--green)}
.add-dropdown{position:absolute;right:0;top:38px;width:250px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);z-index:50;max-height:280px;overflow-y:auto;box-shadow:0 14px 36px rgba(0,0,0,.6)}
.add-search{width:100%;height:34px;padding:0 12px;background:var(--bg3);border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;outline:none}
.ari{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.ari:last-child{border-bottom:none}
.ari:hover{background:var(--bg3)}
.ari.already{opacity:.4;cursor:default}
.ari-name{font-size:13px;font-weight:600;flex:1}
.ari-add{font-size:11px;color:var(--green);font-weight:700}

/* SPLIT */
.main-split{flex:1;display:flex;overflow:hidden}
.grid-panel{flex:1;overflow-y:auto;padding:16px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:12px}
.empty-grid{grid-column:1/-1;padding:56px 20px;text-align:center;color:var(--text3);font-size:14px;line-height:2;font-family:'Rajdhani',sans-serif}
.empty-grid .big{font-size:46px;opacity:.18;margin-bottom:10px;display:block}

/* HERO CARD (shared base — score/EX cards) */
.hcard{background:var(--bg3);border:1.5px solid var(--fac,var(--border));border-radius:var(--r2);padding:10px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;display:flex;flex-direction:column;gap:6px}
.hcard:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(0,0,0,.5)}
.hcard.sel{box-shadow:0 0 0 1px var(--fac,var(--gold)),0 8px 22px rgba(0,0,0,.55)}
.hcard-top{display:flex;align-items:center;justify-content:space-between}
.hcard-role{font-size:14px;line-height:1}
.hcard-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard.sel .hcard-name{color:var(--fac,var(--gold))}
.hcard-meta{display:flex;align-items:center;justify-content:space-between;gap:4px}
.hcard-role-lbl{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:500;color:var(--text3);text-transform:capitalize}
.hero-img{width:100%;height:92px;object-fit:contain;border-radius:8px;background:radial-gradient(circle at 50% 35%,rgba(255,255,255,.05),transparent 70%);display:block}

/* TIER PILL */
.tp{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;line-height:1.3}
.tp-S{background:linear-gradient(180deg,#edc25a,#cc9a32);color:#1a1304}
.tp-A{background:rgba(90,160,255,.18);color:var(--blue);border:1px solid rgba(90,160,255,.4)}

/* COLLECTIBLE BOX CARD (faction-coded) */
.hcard-c{padding:0;gap:0;overflow:hidden}
.hcard-ribbon{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 9px;background:color-mix(in srgb,var(--fac) 20%,var(--bg3));border-bottom:1px solid color-mix(in srgb,var(--fac) 38%,transparent)}
.hcard-fac{font-family:'Rajdhani',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--fac);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:4px}
.hcard-port{position:relative;aspect-ratio:1/1;display:flex;align-items:flex-end;justify-content:center;background:radial-gradient(circle at 50% 30%,color-mix(in srgb,var(--fac) 24%,transparent),transparent 72%)}
.port-role{position:absolute;top:6px;right:8px;font-size:13px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.7));z-index:1}
.hero-img-c{width:90%;height:90%;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));position:relative}
.hero-fallback{width:100%;height:100%;min-height:96px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--bg2)}
.hcard-foot{padding:8px 10px 9px;display:flex;flex-direction:column;gap:5px;background:linear-gradient(180deg,var(--bg3),color-mix(in srgb,var(--fac) 13%,var(--bg3)))}

/* REMOVE BTN */
.rm-card{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:5px;border:none;background:rgba(0,0,0,.5);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .1s;z-index:4}
.hcard:hover .rm-card{opacity:1}
.rm-card:hover{background:var(--red-bg);color:var(--red)}

/* EX CHIP */
.ex-chip{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
.ex-none{background:var(--bg4);color:var(--text3)}
.ex-ok{background:rgba(70,208,144,.16);color:var(--green)}
.ex-mid{background:rgba(240,185,78,.16);color:var(--amber)}
.ex-bad{background:rgba(255,106,106,.14);color:var(--red)}

/* DETAIL PANEL */
.detail-panel{width:300px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.detail-panel.hidden{width:0;border:none;overflow:hidden}
.no-sel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3)}
.no-sel .big{font-size:40px;opacity:.18}
.hdr{padding:16px 16px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px}
.hico{width:48px;height:48px;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hname{font-family:'Cinzel',serif;font-size:16px;font-weight:600;margin-bottom:5px}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid transparent}
.bS{background:rgba(232,184,75,.16);color:var(--gold);border-color:rgba(232,184,75,.4)}
.bA{background:rgba(90,160,255,.16);color:var(--blue);border-color:rgba(90,160,255,.4)}
.bfac,.brole{background:var(--bg4);color:var(--text2);border-color:var(--border)}
.b-required{background:rgba(70,208,144,.14);color:var(--green);border-color:rgba(70,208,144,.4)}
.b-high{background:rgba(90,160,255,.14);color:var(--blue);border-color:rgba(90,160,255,.35)}
.b-nice{background:rgba(168,132,255,.14);color:var(--purple);border-color:rgba(168,132,255,.35)}
.b-niche{background:rgba(255,139,139,.12);color:#ff8b8b;border-color:rgba(255,139,139,.3)}
.b-stretch{background:rgba(240,185,78,.14);color:var(--amber);border-color:rgba(240,185,78,.35)}
.b-skip{background:rgba(255,106,106,.12);color:var(--red);border-color:rgba(255,106,106,.3)}
.b-collab{background:rgba(160,168,184,.12);color:#a0a8b8;border-color:#333a48}
.b-cele{background:rgba(208,155,240,.14);color:#d09bf0;border-color:rgba(208,155,240,.35)}
.dtabs{display:flex}
.dtab{height:32px;padding:0 14px;border:none;background:transparent;color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.dtab:hover{color:var(--text)}
.dtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.dscroll{flex:1;overflow-y:auto;padding:14px 16px}
.sec{margin-bottom:16px}
.stitle{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px}
.frow{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.frow:last-child{margin-bottom:0}
.flbl{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:500;color:var(--text2);width:92px;flex-shrink:0}
.fref{font-size:11px;color:var(--text3)}
select,input[type=number],input[type=text]{height:30px;padding:0 8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;outline:none}
select:focus,input:focus{border-color:var(--gold)}
textarea{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;padding:8px;outline:none;resize:vertical;width:100%}
textarea:focus{border-color:var(--gold)}
.saved{font-size:11px;color:var(--green);opacity:0;transition:opacity .3s;margin-top:6px}
.saved.show{opacity:1}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:100}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:22px;width:440px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h3{font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin-bottom:10px}
.modal .inf{font-size:11px;color:var(--text3);margin-bottom:8px}
.modal textarea{height:160px;font-family:monospace;font-size:11px}
.macts{display:flex;gap:7px;margin-top:14px;justify-content:flex-end}
.toast{position:fixed;bottom:18px;right:18px;padding:10px 15px;border-radius:var(--r);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid}
.toast.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.toast.err{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="brand-mark">◈</span>AFK JOURNEY</div>
  <div class="nav-center">
    <button class="nav-tab active" onclick="switchNav('box')">📦 Box <span class="count-badge" id="box-cnt">0</span></button>
    <button class="nav-tab" onclick="switchNav('ex')">💎 EX</button>
    <button class="nav-tab" onclick="switchNav('stage')">🗺️ Stage</button>
    <button class="nav-tab" onclick="switchNav('dr')">🌙 DR</button>
    <button class="nav-tab" onclick="switchNav('pve')">⚔️ PVE moy.</button>
    <button class="nav-tab" onclick="switchNav('pvp')">🏆 PVP</button>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="doExport()">📤 Exporter</button>
    <button class="btn primary" onclick="triggerImport()">📥 Importer</button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="doImport(event)">
  </div>
</div>

<div class="page">
  <div class="subbar" id="subbar">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input type="text" id="search-inp" placeholder="Filtrer ma collection…" oninput="renderGrid()">
    </div>
    <div id="role-filters"></div>
    <div id="cat-filters"></div>
    <div id="ex-filter-bar" style="display:none;gap:4px">
      <button class="rf active" id="ex-btn-todo" onclick="setExFilter('todo')">🔴 Non atteint</button>
      <button class="rf" id="ex-btn-done" onclick="setExFilter('done')">✅ Atteint</button>
    </div>
    <div class="add-wrap">
      <button class="add-btn" onclick="toggleAddDropdown()">＋ Ajouter un héros</button>
      <div class="add-dropdown" id="add-dropdown" style="display:none">
        <input class="add-search" type="text" id="add-search-inp" placeholder="Rechercher…" oninput="renderAddResults()" autocomplete="off">
        <div id="add-results"></div>
      </div>
    </div>
  </div>
  <div class="main-split">
    <div class="grid-panel" id="grid-panel">
      <div class="cards-grid" id="cards-grid"></div>
    </div>
    <div class="detail-panel hidden" id="detail-panel">
      <div class="no-sel"><div class="big">🗡️</div><p style="font-size:12px">Clique une carte</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data/parangon.js"></script>
<script src="data/heroes.js"></script>
<script src="data/tierlist.js"></script>
<script src="data/calculs.js"></script>
<script>
function heroImg(name){
  const ico=RICO[ROLES[name]]||'⚔️';
  return `<img class="hero-img" src="portraits/${name}.png" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="hero-img" style="display:none;align-items:center;justify-content:center;font-size:24px;background:var(--bg2)">${ico}</div>`;
}
function heroPort(name){
  const ico=RICO[ROLES[name]]||'⚔️';
  return `<div class="hcard-port"><span class="port-role">${ico}</span><img class="hero-img-c" src="portraits/${name}.png" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="hero-fallback" style="display:none">${ico}</div></div>`;
}







const NAV_LIST=['box','ex','stage','dr','pve','pvp'];
// Multiplicateurs Ascension (Parangon)

// Multiplicateurs EX


let UD={};
try{UD=JSON.parse(localStorage.getItem('afk7')||'{}');}catch(e){}
let sel=null,nav='box',roleF='tous',catF='tous',dtab='info',saveTmr=null,addOpen=false,exFilter='todo';

function save(){try{localStorage.setItem('afk7',JSON.stringify(UD));}catch(e){}}
function gf(n,f,d=''){return UD[n]?.[f]??d;}
function sf(n,f,v){if(!UD[n])UD[n]={};UD[n][f]=v;save();flashSaved();}
function isOwned(n){return !!(UD[n]?.owned);}
function ownedList(){return HD.filter(h=>isOwned(h[0]));}




function esc(s){return s.replace(/'/g,"\\'")}

// ── NAV ──
function switchNav(t){
  nav=t; sel=null;
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',NAV_LIST[i]===t));
  buildRoleFilters();
  const ef=document.getElementById('ex-filter-bar');
  if(ef) ef.style.display=t==='ex'?'flex':'none';
  renderGrid();
  hideDetail();
}
function updateBoxCount(){
  const el=document.getElementById('box-cnt');
  if(el) el.textContent=ownedList().length;
}

// ── ROLE FILTERS ──
const CATS=['tous','REQUIRED','High Impact','Nice to Have','Niche','Stretch','Skip','Collab','Cele/Hypo'];
const CAT_ICONS={'tous':'🏷️','REQUIRED':'⭐','High Impact':'🔥','Nice to Have':'👍','Niche':'🎯','Stretch':'📈','Skip':'⏭️','Collab':'🤝','Cele/Hypo':'✨'};

function buildRoleFilters(){
  const roles=['tous',...Object.keys(RICO)];
  const roleOpts=roles.map(r=>`<option value="${r}"${r===roleF?' selected':''}>${r==='tous'?'🌐 Tous les rôles':RICO[r]+' '+r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('');
  document.getElementById('role-filters').innerHTML=`<select class="role-select" onchange="setRole(this.value)">${roleOpts}</select>`;
  const catOpts=CATS.map(c=>`<option value="${c}"${c===catF?' selected':''}>${CAT_ICONS[c]||'•'} ${c==='tous'?'Toutes catégories':c}</option>`).join('');
  document.getElementById('cat-filters').innerHTML=`<select class="role-select" onchange="setCat(this.value)">${catOpts}</select>`;
  // Menu EX filter
  const ef=document.getElementById('ex-filter-bar');
  if(ef) ef.style.display=nav==='ex'?'flex':'none';
}
function setRole(r){roleF=r;renderGrid();}
function setCat(c){catF=c;renderGrid();}
function setExFilter(f){
  exFilter=f;
  document.getElementById('ex-btn-todo').className='rf'+(f==='todo'?' active':'');
  document.getElementById('ex-btn-done').className='rf'+(f==='done'?' active':'');
  renderGrid();
}

// ── COMPOSITE SCORE ──
// Note brute du mode (valeur dans la tier list)

// Score composite : (5.0 - Note) * Mult_Ascension * Mult_EX

// ── RENDER GRID ──
function renderGrid(){
  updateBoxCount();
  const grid=document.getElementById('cards-grid');
  const cnt=ownedList().length;
  const q=document.getElementById('search-inp')?.value.trim().toLowerCase()||'';

  if(nav==='box'){
    let list=ownedList();
    if(q) list=list.filter(h=>h[0].toLowerCase().includes(q));
    if(roleF!=='tous') list=list.filter(h=>(ROLES[h[0]]||'')===roleF);
    if(catF!=='tous') list=list.filter(h=>h[3]===catF);
    grid.style.gridTemplateColumns='repeat(auto-fill,minmax(140px,1fr))';
    if(cnt===0){
      grid.innerHTML=`<div class="empty-grid"><div class="big">📦</div>Ta box est vide.<br>Clique <b>+ Ajouter un héros</b> pour commencer.</div>`;
      return;
    }
    if(!list.length){ grid.innerHTML=`<div class="empty-grid"><div class="big">🔍</div>Aucun héros trouvé.</div>`; return; }
    grid.innerHTML=list.map(h=>`
      <div class="hcard hcard-c${sel===h[0]?' sel':''}" onclick="selHero('${esc(h[0])}')" style="--fac:${FACTION_COLOR[h[2]]||'#5f677b'}">
        <button class="rm-card" onclick="event.stopPropagation();removeHero('${esc(h[0])}')">✕</button>
        <div class="hcard-ribbon"><span class="hcard-fac">${h[2]}</span><span class="tp tp-${h[1]}">${h[1]}</span></div>
        ${heroPort(h[0])}
        <div class="hcard-foot">
          <div class="hcard-name">${h[0]}</div>
          <div class="hcard-meta"><span class="hcard-role-lbl">${ROLES[h[0]]||''}</span>${exChip(h)}</div>
        </div>
      </div>`).join('');
    return;
  }

  if(nav==='ex'){
    renderExCards(grid,cnt,q); return;
  }

  // Stage / DR / PVE / PVP
  const colMap={stage:15,dr:13,pve:'pve',pvp:16};
  const colors={stage:'var(--green)',dr:'var(--teal)',pve:'var(--orange)',pvp:'var(--pink)'};
  const labels={stage:'Stage',dr:'DR',pve:'PVE moy.',pvp:'PVP'};
  const col=colMap[nav], clr=colors[nav], lbl=labels[nav];
  let list=ownedList().map(h=>({h,cs:compositeScore(h,col)}));
  list.sort((a,b)=>b.cs-a.cs);
  if(q) list=list.filter(x=>x.h[0].toLowerCase().includes(q));
  if(roleF!=='tous') list=list.filter(x=>(ROLES[x.h[0]]||'')===roleF);
  if(catF!=='tous') list=list.filter(x=>x.h[3]===catF);
  grid.style.gridTemplateColumns='repeat(auto-fill,minmax(140px,1fr))';
  if(!list.length){ grid.innerHTML=`<div class="empty-grid"><div class="big">🔍</div>Aucun héros trouvé.</div>`; return; }
  const maxCS=list[0]?.cs||1;
  grid.innerHTML=list.map(({h,cs},i)=>{
    const mv=modeNote(h,col);
    const par=gf(h[0],'parangon','')||'—';
    const exV=parseInt(gf(h[0],'ex',0))||0;
    const pct=(cs/maxCS*100).toFixed(0);
    const sc=(cs*100).toFixed(1);
    const rankClr=i===0?'#f0a830':i===1?'#a0a8b8':i===2?'#cd7f32':'var(--text3)';
    const parShort=par.replace('Legendary','Leg.').replace('Supreme','Sup.').replace('Mythic','Myth.').replace('Paragon','P').replace('Elite','Eli.');
    return `<div class="hcard${sel===h[0]?' sel':''}" onclick="selHero('${esc(h[0])}')" style="position:relative;--fac:${FACTION_COLOR[h[2]]||'#5f677b'}">
      <div style="position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${rankClr};z-index:1">${i+1}</div>
      ${heroImg(h[0])}
      <div class="hcard-top" style="margin-top:4px">
        <span class="tp tp-${h[1]}">${h[1]}</span>
        <span style="font-size:9px;color:${clr};font-weight:700">${sc}</span>
      </div>
      <div class="hcard-name">${h[0]}</div>
      <div style="height:3px;background:var(--bg4);border-radius:2px;margin:4px 0;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${clr};border-radius:2px"></div>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:9px;color:var(--text3)">${parShort}</span>
        <span style="font-size:9px;color:var(--text3)">EX ${exV}</span>
      </div>
    </div>`;
  }).join('');
}

// ── EX CARDS ──
function renderExCards(grid,cnt,q){
  if(cnt===0){ grid.innerHTML=`<div class="empty-grid"><div class="big">📦</div>Ta box est vide.</div>`; return; }

  // Tous les héros de la box présents dans ExPrio
  // Paliers qui débloquent l'EX : Supreme+ et au-dessus
  const EX_UNLOCKED_PARS=["Supreme","Supreme+","Paragon 1","Paragon 2","Paragon 3","Paragon 4"];
  const boxInPrio = ownedList().filter(h=>{
    if(!EX_PRIO[h[0]]) return false;
    const par=gf(h[0],'parangon','');
    return EX_UNLOCKED_PARS.includes(par);
  });

  // Séparer atteint / non atteint
  const isDone = h => {
    const prio=EX_PRIO[h[0]]; if(!prio) return false;
    const v=gf(h[0],'ex',''); return v!=='' && parseInt(v)>=prio.cap;
  };

  let list = exFilter==='done'
    ? boxInPrio.filter(h=>isDone(h))
    : boxInPrio.filter(h=>!isDone(h));

  list.sort((a,b)=>(EX_PRIO[a[0]]?.rank||999)-(EX_PRIO[b[0]]?.rank||999));
  if(q) list=list.filter(h=>h[0].toLowerCase().includes(q));
  if(roleF!=='tous') list=list.filter(h=>(ROLES[h[0]]||'')===roleF);
  if(catF!=='tous') list=list.filter(h=>h[3]===catF);

  grid.style.gridTemplateColumns='repeat(auto-fill,minmax(140px,1fr))';
  if(!list.length){
    const msg=exFilter==='done'
      ? '<div class="empty-grid"><div class="big">🔍</div>Aucun cap atteint pour le moment.</div>'
      : boxInPrio.length===0
        ? '<div class="empty-grid"><div class="big">🔒</div>Aucun héros n\'a atteint Supreme+ pour débloquer l\'EX.</div>'
        : '<div class="empty-grid"><div class="big">✅</div>Tous les caps EX sont atteints !</div>';
    grid.innerHTML=msg; return;
  }

  grid.innerHTML=list.map((h,i)=>{
    const prio=EX_PRIO[h[0]];
    const cap=prio.cap;
    // EX10 et EX15 depuis la tier list (cols 9 et 10)
    const ex10ref=parseInt(h[9])||0;  // palier recommandé EX10
    const ex15ref=parseInt(h[10])||0; // palier recommandé EX15
    const myEx=gf(h[0],'ex','');
    const v=myEx===''?null:parseInt(myEx); // mon niveau EX actuel
    const done=v!==null&&v>=cap;
    const cur=v===null?0:Math.min(v,cap);
    const pct=(cur/cap*100).toFixed(0);
    const barClr=done?'var(--green)':cap===15?'var(--purple)':cap===10?'var(--blue)':'var(--teal)';
    const rankClr=i===0?'#f0a830':i===1?'#a0a8b8':i===2?'#cd7f32':'var(--text3)';
    const capClr=done?'var(--green)':cap===15?'var(--purple)':cap===10?'var(--blue)':'var(--teal)';
    // Ligne 1 : ex10ref (palier à atteindre EX10) | ex15ref (objectif cap final)
    // Ligne 2 : mon niveau EX actuel
    const objectifLbl = cap===15 ? (ex15ref>0?'Obj: EX'+ex15ref:'EX 15') : (ex10ref>0?'Obj: EX'+ex10ref:'EX 10');
    const myLbl = v===null ? '— non renseigné' : 'Mon EX : '+v;
    return `<div class="hcard${sel===h[0]?' sel':''}" onclick="selHero('${esc(h[0])}')" style="position:relative;--fac:${FACTION_COLOR[h[2]]||'#5f677b'}">
      <div style="position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${rankClr};z-index:1">${prio.rank}</div>
      ${heroImg(h[0])}
      <div class="hcard-top" style="margin-top:4px">
        <span class="tp tp-${h[1]}">${h[1]}</span>
        <span class="hcard-role">${RICO[ROLES[h[0]]]||'⚔️'}</span>
      </div>
      <div class="hcard-name">${h[0]}</div>
      <div style="height:3px;background:var(--bg4);border-radius:2px;margin:4px 0;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${barClr};border-radius:2px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <span style="font-size:10px;color:var(--text3)">EX10: <b style="color:var(--text)">${ex10ref>0?ex10ref:'—'}</b></span>
        <span style="font-size:10px;color:${capClr};font-weight:600">EX15: <b>${ex15ref>0?ex15ref:'—'}</b></span>
      </div>
      <div style="font-size:10px;color:${v===null?'var(--text3)':done?'var(--green)':barClr};font-weight:600">${myLbl}</div>
    </div>`;
  }).join('');
}

// ── ADD DROPDOWN ──
function toggleAddDropdown(){
  addOpen=!addOpen;
  const dd=document.getElementById('add-dropdown');
  dd.style.display=addOpen?'block':'none';
  if(addOpen){ document.getElementById('add-search-inp').value=''; renderAddResults(); setTimeout(()=>document.getElementById('add-search-inp').focus(),50); }
}
function renderAddResults(){
  const q=document.getElementById('add-search-inp').value.trim().toLowerCase();
  const matches=q?HD.filter(h=>h[0].toLowerCase().includes(q)):HD.slice(0,12);
  document.getElementById('add-results').innerHTML=matches.slice(0,10).map(h=>{
    const already=isOwned(h[0]);
    return `<div class="ari${already?' already':''}" onclick="${already?'':` addHero('${esc(h[0])}');`}">
      <span class="tp tp-${h[1]}">${h[1]}</span>
      <span class="ari-name">${h[0]}</span>
      <span class="ari-add">${already?'✓':'+Ajouter'}</span>
    </div>`;
  }).join('');
}
document.addEventListener('click',e=>{ if(addOpen&&!e.target.closest('.add-wrap')){ addOpen=false; document.getElementById('add-dropdown').style.display='none'; } });
function addHero(name){
  if(!UD[name])UD[name]={};
  UD[name].owned=true; save();
  addOpen=false; document.getElementById('add-dropdown').style.display='none';
  renderGrid(); selHero(name);
  toast('✅ '+name+' ajouté');
}
function removeHero(name){
  if(UD[name])UD[name].owned=false; save();
  if(sel===name){ sel=null; hideDetail(); }
  renderGrid(); toast('🗑️ '+name+' retiré');
}

// ── SELECT / DETAIL ──
function selHero(name){ sel=name; dtab='info'; renderGrid(); showDetail(name); }
function hideDetail(){
  const dp=document.getElementById('detail-panel');
  dp.classList.add('hidden');
  dp.innerHTML='<div class="no-sel"><div class="big">🗡️</div><p style="font-size:12px">Clique une carte</p></div>';
}
function showDetail(name){
  const dp=document.getElementById('detail-panel');
  dp.classList.remove('hidden');
  const h=HD.find(x=>x[0]===name);
  const role=ROLES[h[0]]||'';
  dp.innerHTML=`
    <div class="hdr">
      <div class="hdr-top">
        <div class="hico">${RICO[role]||'⚔️'}</div>
        <div>
          <div class="hname">${h[0]}</div>
          <div class="badges">
            <span class="badge b${h[1]}">${h[1]} Tier</span>
            <span class="badge ${catB(h[3])}">${h[3]}</span>
            <span class="badge bfac">${h[2]}</span>
            <span class="badge brole">${role}</span>
          </div>
        </div>
      </div>
      <div class="dtabs">
        ${['info','notes'].map(t=>`<button class="dtab${dtab===t?' active':''}" onclick="swDtab('${t}')">${t.toUpperCase()}</button>`).join('')}
      </div>
    </div>
    <div class="dscroll" id="dscroll"></div>`;
  renderDtab(h);
}
function swDtab(t){ dtab=t; showDetail(sel); }
function renderDtab(h){ document.getElementById('dscroll').innerHTML = dtab==='info'?dtInfo(h):dtNotes(h); }

function dtInfo(h){
  const n=h[0];
  const par=gf(n,'parangon');
  const pOpts=['',...PARANGONS].map(p=>`<option value="${p}"${p===par?' selected':''}>${p||'— non défini —'}</option>`).join('');
  const ex10r=parseInt(h[9]),ex15r=parseInt(h[10]);
  const exMy=gf(n,'ex','');
  const exOpts=Array.from({length:16},(_,i)=>i).map(v=>`<option value="${v}"${v==exMy?' selected':''}>${v}</option>`).join('');
  const need10=ex10r>0,need15=ex15r>0;
  // Rang dans la priorité EX
  const allTodo=ownedList().filter(hh=>{
    const mx=gf(hh[0],'ex',''); const vv=mx===''?null:parseInt(mx);
    const ok10=parseInt(hh[9])<=0||(vv!==null&&vv>=parseInt(hh[9]));
    const ok15=parseInt(hh[10])<=0||(vv!==null&&vv>=parseInt(hh[10]));
    return !(ok10&&ok15);
  }).sort((a,b)=>parseFloat(b[7])-parseFloat(a[7]));
  const myRank=allTodo.findIndex(hh=>hh[0]===n)+1;
  const finalCap=need15?15:need10?10:null;
  const exV=exMy===''?null:parseInt(exMy);
  const capDone=(need10?(exV!==null&&exV>=ex10r):true)&&(need15?(exV!==null&&exV>=ex15r):true);
  let capHTML;
  if(!need10&&!need15) capHTML='<span style="color:var(--green)">✅ Pas de cap requis</span>';
  else if(capDone) capHTML='<span style="color:var(--green)">✅ Cap atteint</span>';
  else capHTML=`🎯 Atteindre <b>EX ${finalCap}</b>${myRank>0?' — priorité <b style="color:var(--blue)">#'+myRank+' / '+allTodo.length+'</b>':''}`;

  return `<div class="sec">
    <div class="stitle">Mon héros</div>
    <div class="card">
      <div class="frow">
        <span class="flbl">Niveau EX</span>
        <select onchange="sf('${esc(n)}','ex',parseInt(this.value))">${exOpts}</select>
      </div>
      <div class="frow">
        <span class="flbl" style="color:var(--text3);font-size:10px">Priorité EX</span>
        <span class="fref" id="cap-span"></span>
      </div>
      <div class="frow">
        <span class="flbl">Parangon</span>
        <select onchange="sf('${esc(n)}','parangon',this.value)">${pOpts}</select>
      </div>
    </div>
  </div>
  <div class="saved" id="saved-ok">✅ Sauvegardé</div>`;
  setTimeout(()=>{ const el=document.getElementById('cap-span'); if(el) el.innerHTML=capHTML; },0);
}

function dtNotes(h){
  const n=h[0];
  const notes=gf(n,'notes','');
  return `<div class="sec">
    <div class="stitle">Notes</div>
    <div class="card">
      <textarea rows="7" placeholder="Tes notes sur ${h[0]}..." onchange="sf('${esc(n)}','notes',this.value)">${notes}</textarea>
    </div>
  </div>
  <div class="saved" id="saved-ok">✅ Sauvegardé</div>`;
}

function catB(cat){
  const c=cat.toLowerCase();
  if(c==='shemira'||c==='required') return 'b-required';
  if(c==='high impact') return 'b-high';
  if(c==='nice to have') return 'b-nice';
  if(c==='niche') return 'b-niche';
  if(c==='stretch') return 'b-stretch';
  if(c==='skip') return 'b-skip';
  if(c==='collab') return 'b-collab';
  if(c==='cele/hypo') return 'b-cele';
  return 'bfac';
}
function flashSaved(){
  const el=document.getElementById('saved-ok');
  if(!el) return;
  el.classList.add('show');
  clearTimeout(saveTmr);
  saveTmr=setTimeout(()=>el&&el.classList.remove('show'),2000);
}
function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(err?'err':'ok');
  setTimeout(()=>t.className='toast',2500);
}

// ── EXPORT / IMPORT ──
function doExport(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(UD,null,2));
  a.download='afk_box.json'; a.click(); toast('💾 Box sauvegardée');
}
function triggerImport(){ document.getElementById('file-input').value=''; document.getElementById('file-input').click(); }
const FR_MAP={"Aile d'Ombre":"Shadewing","Larisa":"Parisa","Hepler":"Hepler"};
function convertOldFormat(d){
  if(!d.version&&!d.heroes) return d;
  const out={};
  (d.heroes||[]).forEach(name=>{ const m=FR_MAP[name]||name; if(!out[m])out[m]={}; out[m].owned=true; });
  Object.entries(d.ex||{}).forEach(([name,val])=>{ const m=FR_MAP[name]||name; if(!out[m])out[m]={}; out[m].ex=val; });
  Object.entries(d.paragon||{}).forEach(([name,val])=>{ const m=FR_MAP[name]||name; if(!out[m])out[m]={}; out[m].parangon=val; });
  return out;
}
function doImport(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      UD=convertOldFormat(JSON.parse(ev.target.result)); save();
      renderGrid(); if(sel&&!isOwned(sel)){ sel=null; hideDetail(); }
      const cnt=Object.values(UD).filter(v=>v.owned).length;
      toast('✅ '+cnt+' héros importés');
    }catch(err){ toast('❌ Fichier invalide',true); }
  };
  reader.readAsText(file);
}

// ── INIT ──
buildRoleFilters();
renderGrid();
